name: Update Predictions

# Runs the model on a schedule and commits the refreshed predictions CSV.
# Streamlit Cloud then redeploys automatically from the new commit.
on:
  schedule:
    # Daily at 06:00 UTC (= 14:00 Singapore time). Cron is UTC and "best effort"
    # on GitHub -- it can be delayed by a few minutes. Adjust the time below.
    - cron: "0 6 * * *"
  workflow_dispatch:   # adds a manual "Run workflow" button in the Actions tab

# Required so the job can push the updated CSV back to the repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run the model
        run: python -m scripts.run_pipeline --no-lineups --no-weather

      - name: Commit refreshed predictions (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/world_cup_predictions.csv
          if git diff --staged --quiet; then
            echo "No change in predictions -- nothing to commit."
          else
            git commit -m "auto-update predictions ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
